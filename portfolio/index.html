<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
</head>

<body class="portfolio-body">

  <!-- BACK BUTTON -->
  <a href="/" class="back-button">← Back</a>

  <!-- TABS -->
  <div class="portfolio-top">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('cars')">Cars</button>
      <button class="tab" onclick="switchTab('portraits')">Portraits</button>
      <button class="tab" onclick="switchTab('lifestyle')">Lifestyle</button>
    </div>
  </div>

  <!-- GALLERIES -->
  <div class="gallery-wrapper">

    <!-- CARS -->
    <div class="gallery active" id="cars">
      <img src="../images/cars1.jpg">
      <img src="../images/cars2.jpg">
      <img src="../images/cars3.jpg">
    </div>

    <!-- PORTRAITS -->
    <div class="gallery" id="portraits">
      <img src="../images/portraits1.jpg">
      <img src="../images/portraits2.jpg">
    </div>

    <!-- LIFESTYLE -->
    <div class="gallery" id="lifestyle">
      <img src="../images/life1.jpg">
      <img src="../images/life2.jpg">
    </div>

  </div>

  <script>
    function switchTab(tabId) {
      // hide all galleries
      document.querySelectorAll(".gallery").forEach(g => {
        g.classList.remove("active");
      });

      // show selected
      document.getElementById(tabId).classList.add("active");

      // update tab styles
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      event.target.classList.add("active");

      // scroll back to top
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>

</body>
</html>
