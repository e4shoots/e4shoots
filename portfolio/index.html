<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="home-body">

  <!-- Logo -->
  <a href="/">
    <img src="/images/favicon.png" class="corner-logo">
  </a>

  <main class="container">

    <h1 class="logo">Portfolio</h1>
    <p class="tagline">Selected work from Kaua‘i and beyond.</p>

    <!-- 🔥 TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="tab1">Portraits</button>
      <button class="tab" data-tab="tab2">Lifestyle</button>
      <button class="tab" data-tab="tab3">Creative</button>
    </div>

    <!-- 🔥 EMBEDS -->
    <div class="tab-content">

      <!-- TAB 1 -->
      <div class="tab-panel active" id="tab1">
        <iframe 
         src="https://drive.google.com/embeddedfolderview?id=1iI7qkTnsp4g58s2bnObkZsstgVIw854p#grid" 
         style="width:100%; height:600px; border:0;">
        </iframe>
      </div>

      <!-- TAB 2 -->
      <div class="tab-panel" id="tab2">
        <iframe src="YOUR_GOOGLE_DRIVE_EMBED_2"
          class="embed-frame"></iframe>
      </div>

      <!-- TAB 3 -->
      <div class="tab-panel" id="tab3">
        <iframe src="YOUR_GOOGLE_DRIVE_EMBED_3"
          class="embed-frame"></iframe>
      </div>

    </div>

    <!-- BACK -->
    <div class="bottom-stack">
      <a href="/" class="link">← Back Home</a>
    </div>

  </main>

  <!-- 🔥 TAB SCRIPT -->
  <script>
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".tab-panel");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {

        tabs.forEach(t => t.classList.remove("active"));
        panels.forEach(p => p.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");

      });
    });
  </script>

</body>
</html>
