<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio | e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/favicon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="home-body">

  <!-- Corner Logo -->
  <a href="/">
    <img src="/images/favicon.png" alt="e4shoots logo" class="corner-logo">
  </a>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- TITLE -->
    <h1 class="logo">Portfolio</h1>
    <p class="tagline">Selected work from Kaua‘i and beyond.</p>

    <!-- IMAGE GRID -->
    <section class="grid" style="margin-top:40px;">

      <img src="/images/1.jpg" alt="">
      <img src="/images/2.jpg" alt="">
      <img src="/images/3.jpg" alt="">
      <img src="/images/4.jpg" alt="">
      <img src="/images/5.jpg" alt="">
      <img src="/images/6.jpg" alt="">
      <img src="/images/7.jpg" alt="">
      <img src="/images/8.jpg" alt="">
      <img src="/images/9.jpg" alt="">

    </section>

    <!-- BACK LINK -->
    <div class="bottom-stack">
      <p>
        <a href="/" class="link">← Back Home</a>
      </p>
    </div>

  </main>

  <!-- FADE IN -->
  <script>
    document.body.style.opacity = 0;
    window.addEventListener("load", () => {
      document.body.style.transition = "opacity 0.6s ease";
      document.body.style.opacity = 0.9;
    });
  </script>

</body>
</html>
