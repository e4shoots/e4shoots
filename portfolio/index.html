<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portfolio</title>

  <!-- Your CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">

</head>

<body class="portfolio-body">

  <!-- =========================
       TOP NAV (TABS)
  ========================= -->
  <div class="portfolio-top">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- =========================
       GALLERIES CONTAINER
  ========================= -->
  <div class="gallery-wrapper">
    <div id="galleries"></div>
  </div>

  <!-- =========================
       MODULAR ALBUM SYSTEM
  ========================= -->
  <script>
    const cloudName = "YOUR_CLOUD_NAME";

    // 🔥 Modular Albums (EDIT ONLY THIS)
    const albums = [
      {
        id: "album1",
        title: "Weddings",
        images: [
          "sample/1",
          "sample/2",
          "sample/3",
          "sample/4"
        ]
      },
      {
        id: "album2",
        title: "Portraits",
        images: [
          "sample/5",
          "sample/6",
          "sample/7"
        ]
      },
      {
        id: "album3",
        title: "Street",
        images: [
          "sample/8",
          "sample/9"
        ]
      }
    ];

    const tabsContainer = document.getElementById("tabs");
    const galleriesContainer = document.getElementById("galleries");

    // =========================
    // CREATE TABS
    // =========================
    function createTabs() {
      albums.forEach((album, index) => {
        const tab = document.createElement("button");

        tab.className = "tab";
        tab.innerText = album.title;

        if (index === 0) tab.classList.add("active");

        tab.onclick = () => switchAlbum(album.id, tab);

        tabsContainer.appendChild(tab);
      });
    }

    // =========================
    // CREATE GALLERIES
    // =========================
    function createGalleries() {
      albums.forEach((album, index) => {
        const gallery = document.createElement("div");

        gallery.id = album.id;
        gallery.className = "gallery";

        if (index === 0) gallery.classList.add("active");

        album.images.forEach(publicId => {
          const img = document.createElement("img");

          img.src = `https://res.cloudinary.com/${cloudName}/image/upload/${publicId}.jpg`;

          gallery.appendChild(img);
        });

        galleriesContainer.appendChild(gallery);
      });
    }

    // =========================
    // SWITCH ALBUM
    // =========================
    function switchAlbum(id, clickedTab) {

      // hide all galleries
      document.querySelectorAll(".gallery").forEach(g => {
        g.classList.remove("active");
      });

      // show selected gallery
      document.getElementById(id).classList.add("active");

      // update tabs
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("active");
      });

      clickedTab.classList.add("active");
    }

    // =========================
    // INIT
    // =========================
    createTabs();
    createGalleries();

  </script>

</body>
</html>
