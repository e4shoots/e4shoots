<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About - e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" href="https://e4shoots.com/images/favicon.png">
  <link rel="apple-touch-icon" href="https://e4shoots.com/images/favicon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="home-body">

  <!-- Corner logo -->
  <a href="/">
    <img src="/images/favicon.png" class="corner-logo" alt="e4shoots logo">
  </a>

  <main class="container">

    <!-- ABOUT BOX -->
    <div class="about-box">

      <!-- IMAGE AREA -->
      <div class="about-image">
        <img src="/images/about.jpg" alt="About e4shoots">
      </div>

      <!-- TEXT AREA -->
      <div class="about-text">

        <h1 class="logo">About</h1>

        <p class="tagline">
          Im Elia Bernaldes, I started e4shoots cause of my passion for the craft.
        </p>

        <p class="about-small">
          .
        </p>

        <a href="/" class="link">Back Home</a>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <div class="bottom-stack">
    <p>[ Kaua‘i, Hawai‘i ]</p>
    <p>© 2026 e4shoots</p>
  </div>

  <!-- fade in -->
  <script>
    document.body.style.opacity = 0;
    window.addEventListener("load", () => {
      document.body.style.transition = "opacity 0.6s ease";
      document.body.style.opacity = 1;
    });
  </script>

</body>
</html>
