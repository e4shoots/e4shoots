<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph (optional but keeps consistency) -->
  <meta property="og:title" content="404 - e4shoots">
  <meta property="og:description" content="Page not found.">
  <meta property="og:type" content="website">

  <!-- Favicon -->
  <link rel="icon" href="https://e4shoots.com/images/favicon.png">
  <link rel="shortcut icon" href="https://e4shoots.com/images/favicon.png">
  <link rel="apple-touch-icon" href="https://e4shoots.com/images/favicon.png">

  <!-- Main Styles -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="home-body">

  <!-- Corner Logo (same as main site) -->
  <a href="/">
    <img src="images/favicon.png" alt="e4shoots logo" class="corner-logo">
  </a>

  <!-- MAIN CONTENT -->
  <main class="container">

    <h1 class="logo">Sorry, you've run into a 404 Error</h1>
    <p class="tagline">Page not found.</p>

    <nav class="links">
      <a href="/" class="link">Go Home</a>
    </nav>

  </main>

  <!-- Footer (same system as main site) -->
  <div class="bottom-stack">
    <p>[ Kaua‘i, Hawai‘i ]</p>
    <p>© 2026 e4shoots</p>
  </div>

  <!-- Fade-in animation -->
  <script>
    document.body.style.opacity = 0;
    window.addEventListener("load", () => {
      document.body.style.transition = "opacity 0.6s ease";
      document.body.style.opacity = 1;
    });
  </script>

</body>
</html>
