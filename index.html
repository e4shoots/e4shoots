<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>e4shoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:title" content="e4shoots">
  <meta property="og:description" content="Modern photography from Kaua‘i.">
  <meta property="og:image" content="https://ik.imagekit.io/e4Media/e4shoots/DSC__08.jpg">
  <meta property="og:url" content="https://e4shoots.com">
  <meta property="og:type" content="website">

  <!-- Icons -->
  <link rel="icon" href="https://e4shoots.com/images/favicon.png">
  <link rel="shortcut icon" href="https://e4shoots.com/images/favicon.png">
  <link rel="apple-touch-icon" href="https://e4shoots.com/images/favicon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="home-body">

  <!-- Corner Logo -->
  <a href="/">
    <img src="images/favicon.png" alt="e4shoots logo" class="corner-logo">
  </a>

  <!-- MAIN CONTENT -->
  <main class="container">

    <h1 class="logo">e4shoots</h1>
    <p class="tagline">Modern photography from Kaua‘i.</p>

    <nav class="links">

      <!-- Instagram -->
      <a href="https://instagram.com/e4shoots" target="_blank" class="link">
        <img class="icon" src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram">
        |<span class="accent-blue">@e4shoots</span>
      </a>

      <!-- Personal Instagram -->
      <a href="https://instagram.com/ebernaldes" target="_blank" class="link">
        <img class="icon" src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram">
        |<span class="muted">@ebernaldes</span>
      </a>

      <!-- Venmo -->
      <a href="https://venmo.com/u/e4shoots" target="_blank" class="link">
        <img class="icon" src="https://cdn.simpleicons.org/venmo/ffffff" alt="Venmo">
        |<span class="accent-green">Donate</span>
      </a>

    </nav>

    <!-- Footer -->
    <div class="bottom-stack">
      <p>[ Kaua‘i, Hawai‘i ]</p>
      <p>© 2026 e4shoots</p>
    </div>

  </main>

  <!-- Fade-in -->
  <script>
    document.body.style.opacity = 0;
    window.addEventListener("load", () => {
      document.body.style.transition = "opacity 0.6s ease";
      document.body.style.opacity = 1;
    });
  </script>

</body>
</html>
